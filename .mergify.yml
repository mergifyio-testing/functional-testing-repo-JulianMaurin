merge_queue:
  max_parallel_checks: 3
pull_request_rules:
- actions:
    queue:
      name: default
  conditions:
  - base=20260308221549/test_unqueue_conditions_and_train_reset/main
  - label=queue
  - '#approved-reviews-by>=1'
  name: auto-queue
queue_rules:
- batch_max_wait_time: 0 s
  batch_size: 2
  merge_conditions:
  - status-success=continuous-integration/fake-ci
  merge_method: squash
  name: default
