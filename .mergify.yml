merge_queue:
  max_parallel_checks: 5
pull_request_rules:
- actions:
    queue:
      name: default
  conditions:
  - base=20260307073115/test_fast_forward_batch_merge_and_second_round/main
  - label=queue
  name: auto-queue
queue_rules:
- batch_max_wait_time: 0 s
  batch_size: 2
  merge_conditions:
  - status-success=continuous-integration/fake-ci
  name: default
  queue_branch_merge_method: fast-forward
