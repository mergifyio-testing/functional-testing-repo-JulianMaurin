merge_queue:
  max_parallel_checks: 5
priority_rules:
- conditions:
  - queue-name=hotfix
  name: hotfix-priority
  priority: high
pull_request_rules:
- actions:
    queue:
      name: default
  conditions:
  - base=20260306104825/test_entry_failure_recovery_and_merge/main
  - label=ready-to-merge
  name: auto-queue
queue_rules:
- merge_conditions: []
  name: hotfix
  queue_conditions:
  - label=hotfix
- merge_conditions:
  - status-success=continuous-integration/fake-ci
  - '#approved-reviews-by>=1'
  merge_method: squash
  name: default
